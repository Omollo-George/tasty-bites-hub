[build]
  # Point to the root where your workspaces are defined
  base = ""
  # Build using the root config
  command = "npm run build"
  # The directory where Vite generates the production files
  publish = "dist"

[[redirects]]
  # Proxy API requests to your Django backend on Render
  from = "/api/*"
  to = "https://tasty-bites-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Ensure React Router handles navigation correctly (SPA fallback)
  from = "/*"
  to = "/index.html"
  status = 200