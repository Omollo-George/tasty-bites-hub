version: '3.8'
services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=False
      - PORT=8000
      - DJANGO_SECRET_KEY=changeme
      - RUN_MIGRATIONS=false
    command: /usr/local/bin/docker-entrypoint.sh
