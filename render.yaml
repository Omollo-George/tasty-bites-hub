services:
  - type: web
    name: tasty-bites-backend
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r tastybites/requirements.txt && python tastybites/manage.py collectstatic --noinput && python tastybites/manage.py migrate
    startCommand: gunicorn tastybites.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tasty-bites-frontend.onrender.com"
      - key: MPESA_CALLBACK_URL
        value: ""
      - key: MPESA_ADMIN_TOKEN
        value: ""
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        value: ""

  - type: static_site
    name: tasty-bites-frontend
    env: node
    region: ohio
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://tasty-bites-backend.onrender.com/api"
