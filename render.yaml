services:
  # Frontend: Static Site (React/Vite)
  - type: static
    name: tasty-bites-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://tasty-bites-backend.onrender.com/api

  # Backend: Web Service (Django)
  - type: web
    name: tasty-bites-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input
    startCommand: gunicorn tasty_bites.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tasty-bites-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MPESA_ADMIN_TOKEN
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings

databases:
  - name: tasty-bites-db
    plan: free
    region: oregon