services:
  # Frontend: Static Site (React/Vite)
  - type: static
    name: tasty-bites-frontend
    rootDir: .
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: VITE_API_URL
        value: https://your-backend-name.sevalla.app/api

  # Backend: Web Service (Django)
  - type: web
    name: tasty-bites-backend
    rootDir: tastybites
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input
    startCommand: gunicorn tastybites.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tasty-bites-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.sevalla.app"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MPESA_ADMIN_TOKEN
        generateValue: true
      - key: CSRF_TRUSTED_ORIGINS # Added for cross-origin CSRF protection
        value: https://your-frontend-name.sevalla.app,https://your-backend-name.sevalla.app
      - key: MPESA_CALLBACK_URL
        value: https://your-backend-name.sevalla.app/api/payments/callback/
      - key: DJANGO_SETTINGS_MODULE
        value: tastybites.settings
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-name.sevalla.app

databases:
  - name: tasty-bites-db
    plan: free
    region: oregon