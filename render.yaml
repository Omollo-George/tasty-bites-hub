services:
  # Frontend: Static Site
  - type: static
    name: tasty-bites-frontend
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: tasty-bites-backend
          property: host

  # Backend: Web Service (Django)
  - type: web
    name: tasty-bites-backend
    env: python
    buildCommand: pip install -r tastybites/requirements.txt && python tastybites/manage.py collectstatic --noinput && python tastybites/manage.py migrate
    startCommand: gunicorn tastybites.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tasty-bites-frontend.onrender.com"
      - key: NODE_VERSION
        value: "20"
      - key: NPM_FLAGS
        value: "--legacy-peer-deps"

databases:
  - name: tasty-bites-db
    plan: free