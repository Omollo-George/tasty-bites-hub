services:
  - type: web_service
    name: tasty-bites-backend
    env: python
    region: ohio
    plan: free
    root: tastybites
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn tastybites.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tasty-bites-hub.onrender.com"
      - key: MPESA_CALLBACK_URL
        value: "https://tasty-bites-backend.onrender.com/api/payments/callback/"
      - key: MPESA_ADMIN_TOKEN
        value: "temp-token"
      - key: EMAIL_HOST_USER
        value: "temp@email.com"
      - key: EMAIL_HOST_PASSWORD
        value: "temp-password"

  - type: static_site
    name: tasty-bites-hub
    env: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://tasty-bites-backend.onrender.com/api"
