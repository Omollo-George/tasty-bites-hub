name: Run Django migrations

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - '.github/workflows/**'
      - 'requirements.txt'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'render.yaml'
      - 'vercel.json'
      - 'fly.toml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/**'
      - 'requirements.txt'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'render.yaml'
      - 'vercel.json'
      - 'fly.toml'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: 'False'
        run: |
          python backend/tastybites/manage.py migrate --noinput
