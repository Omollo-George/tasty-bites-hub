name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip Docker Hub push if credentials are missing
        if: github.event_name != 'pull_request' && (secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '')
        run: |
          echo "⚠️ Docker Hub credentials are not configured. Skipping login and push."
          echo "Set DOCKER_USERNAME and DOCKER_PASSWORD in repository secrets to enable publishing."

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract repository name
        id: repo
        run: |
          echo "name=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:buildcache,mode=max

      - name: Image build successful
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        run: |
          echo "✅ Docker image pushed successfully to Docker Hub!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:latest"
          echo "Next step: Deploy to Sevalla from this image"
