name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip Docker Hub push if credentials are missing
        if: github.event_name != 'pull_request' && (env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == '')
        run: |
          echo "⚠️ Docker Hub credentials are not configured. Skipping login and push."
          echo "Set DOCKER_USERNAME and DOCKER_PASSWORD in repository secrets to enable publishing."

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract repository name
        id: repo
        run: |
          echo "name=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:buildcache,mode=max

      - name: Image build successful
        if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          echo "✅ Docker image pushed successfully to Docker Hub!"
          echo "Image: ${{ env.DOCKER_USERNAME }}/${{ steps.repo.outputs.name }}:latest"
          echo "Next step: Deploy to Sevalla from this image"

  deploy-to-sevalla:
    name: Deploy to Sevalla (optional)
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      SEVALLA_API_URL: ${{ secrets.SEVALLA_API_URL }}
      SEVALLA_API_TOKEN: ${{ secrets.SEVALLA_API_TOKEN }}
      SEVALLA_APP: ${{ secrets.SEVALLA_APP }}
    if: github.event_name != 'pull_request'
    steps:
      - name: Check for Sevalla configuration
        run: |
          if [ -z "${{ env.SEVALLA_API_URL }}" ] || [ -z "${{ env.SEVALLA_API_TOKEN }}" ] || [ -z "${{ env.DOCKER_USERNAME }}" ]; then
            echo "⚠️ Sevalla API or Docker credentials not configured. Skipping automated deploy."
            echo "To enable automated deploy, set repository secrets: SEVALLA_API_URL, SEVALLA_API_TOKEN, and DOCKER_USERNAME."
            exit 0
          fi

      - name: Trigger Sevalla deploy via API
        run: |
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          DOCKER_USER="${{ env.DOCKER_USERNAME }}"
          if [ -z "$DOCKER_USER" ]; then
            echo "⚠️ DOCKER_USERNAME not set in secrets; falling back to GITHUB_ACTOR: $GITHUB_ACTOR"
            DOCKER_USER="$GITHUB_ACTOR"
          fi
          IMAGE_NAME="$DOCKER_USER/$REPO_NAME:latest"
          echo "Triggering Sevalla deploy for image: ${IMAGE_NAME}"
          # ensure resp file exists to avoid cat errors
          : > /tmp/resp_body
          HTTP_CODE=$(curl -s -o /tmp/resp_body -w "%{http_code}" -X POST "${{ env.SEVALLA_API_URL }}" \
            -H "Authorization: Bearer ${{ env.SEVALLA_API_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d "{ \"image\": \"${IMAGE_NAME}\", \"app\": \"${{ env.SEVALLA_APP }}\" }") || HTTP_CODE=000
          BODY=$(cat /tmp/resp_body 2>/dev/null || true)
          echo "Sevalla response HTTP code: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Sevalla accepted the deploy request (HTTP $HTTP_CODE)."
          else
            echo "⚠️ Sevalla deploy request returned HTTP $HTTP_CODE. Check the API URL, token, and Sevalla logs."
            exit 1
          fi
